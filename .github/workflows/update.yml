name: Update Weather Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ingestion container
        run: docker build -t weather-ingesta:latest .

      - name: Fetch weather data in container
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          docker run --rm \
            -e OWM_API_KEY="${OWM_API_KEY}" \
            -v "${{ github.workspace }}/data:/app/data" \
            weather-ingesta:latest

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/weather_boyaca.csv data/boyaca_geocoding_cache.json
          git diff --staged --quiet || git commit -m "Actualizar datos $(date -u +%FT%TZ)"
          git push
